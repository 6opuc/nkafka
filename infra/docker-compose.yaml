    volumes:
      - kafka-3-data:/var/lib/kafka/data
      - ./secrets/kafka-3.keystore.jks:/etc/kafka/secrets/kafka-3.keystore.jks
      - ./secrets/keystore-creds:/etc/kafka/secrets/keystore-creds
      - ./secrets/key-creds:/etc/kafka/secrets/key-creds
      - ./secrets/empty-jaas.conf:/etc/kafka/secrets/empty-jaas.conf

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: always
    environment:
      - KAFKA_CLUSTERS_0_NAME=test-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
    ports:
      - 8081:8080

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
